<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Code Assistant</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        /* Backgrounds */
        --bg-primary: #111111;
        --bg-secondary: #191919;
        --bg-tertiary: #222222;
        --bg-hover: #2a2a2a;
        --bg-input: #1e1e1e;
        --bg-sidebar: #161616;

        /* Borders */
        --border-default: #2d2d2d;
        --border-muted: #242424;
        --border-focus: #4a4a4a;

        /* Text */
        --text-primary: #ececec;
        --text-secondary: #9e9e9e;
        --text-muted: #5e5e5e;
        --text-inverse: #111111;

        /* Accents */
        --accent-primary: #cc785c;
        --accent-primary-hover: #d98b70;
        --accent-blue: #5b9cf6;
        --accent-green: #4ade80;
        --accent-red: #f87171;
        --accent-orange: #cc785c;
        --accent-purple: #a78bfa;
        --accent-yellow: #fbbf24;

        /* Layout */
        --sidebar-width: 260px;
        --topbar-height: 48px;
        --chat-max-width: 720px;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Noto Sans', Helvetica, Arial, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
        height: 100vh;
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { height: 100vh; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #444; }

      /* Selection */
      ::selection { background: rgba(204, 120, 92, 0.25); }

      /* Animations */
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
